      { q:"Os três pilares da Tríade CIA são:",

      { q:"Um ataque DDoS ataca qual pilar?",

      { q:"Qual destes É malware?",

      { q:"Principal defesa contra ransomware:",

      { q:"Phishing explora principalmente:",

      { q:"2FA adiciona:",

      { q:"Criptografia assimétrica usa:",
        options:["Uma chave só","Um par de chaves (pública/privada)","Três chaves","Zero chaves"], correct:1,
        explain:"Par: pública cifra, privada decifra (ou vice-versa para assinatura)." },
      { q:"Hash é:",

      { q:"A porta 443 é usada por:",
        options:["HTTP","HTTPS","FTP","Telnet"], correct:1, explain:"443 é HTTPS (TLS sobre TCP)." },

      { q:"XSS mira:",

      { q:"LGPD é a lei:",
